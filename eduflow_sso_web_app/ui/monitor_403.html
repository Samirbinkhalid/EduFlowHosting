<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied · MentorMind</title>
  <link href="/ui/fonts.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1a7abf;
      --blue-bright: #2499ee;
      --orange:      #e87722;
      --bg:          #02060f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Russo One', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(26,122,191,.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 80%, rgba(232,119,34,.06) 0%, transparent 55%),
        var(--bg);
    }

    /* scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(0, 10, 28, .75);
      border: 1px solid rgba(26, 122, 191, .25);
      border-radius: 20px;
      padding: clamp(36px, 6vw, 64px) clamp(32px, 6vw, 72px);
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow:
        0 0 60px rgba(26,122,191,.08),
        inset 0 0 40px rgba(0,8,30,.4);
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 900;
      line-height: 1;
      color: var(--blue-bright);
      text-shadow:
        0 0 20px var(--blue-bright),
        0 0 60px rgba(36,153,238,.5),
        0 0 100px rgba(36,153,238,.2);
      letter-spacing: .08em;
      animation: codeGlow 3s ease-in-out infinite;
    }

    @keyframes codeGlow {
      0%,100% {
        text-shadow: 0 0 20px var(--blue-bright), 0 0 60px rgba(36,153,238,.5), 0 0 100px rgba(36,153,238,.2);
      }
      50% {
        text-shadow: 0 0 30px var(--blue-bright), 0 0 80px rgba(36,153,238,.7), 0 0 130px rgba(36,153,238,.35);
      }
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(36,153,238,.4), transparent);
      margin: clamp(16px, 3vw, 28px) 0;
    }

    .headline {
      font-family: 'Russo One', sans-serif;
      font-size: clamp(.95rem, 2.5vw, 1.25rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(180, 210, 240, .92);
      margin-bottom: 12px;
    }

    .subtext {
      font-family: 'Russo One', sans-serif;
      font-size: clamp(.62rem, 1.3vw, .76rem);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(100, 150, 190, .55);
      line-height: 1.6;
    }

    .back-btn {
      display: inline-block;
      margin-top: clamp(24px, 4vw, 36px);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(.62rem, 1.3vw, .76rem);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--blue-bright);
      border: 1.5px solid rgba(36,153,238,.45);
      padding: 10px 28px;
      border-radius: 8px;
      transition: box-shadow .2s, border-color .2s, color .2s;
    }
    .back-btn:hover {
      color: #fff;
      border-color: var(--blue-bright);
      box-shadow: 0 0 18px rgba(36,153,238,.4), inset 0 0 12px rgba(36,153,238,.08);
    }

    .brand {
      margin-top: clamp(28px, 4vw, 40px);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(.52rem, 1vw, .62rem);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(70, 120, 170, .35);
    }
    .brand span { color: rgba(232,119,34,.35); }
  </style>
</head>
<body>
  <div class="card">
    <div class="error-code">403</div>
    <div class="divider"></div>
    <div class="headline">You don't have access to this page</div>
    <div class="subtext">This area is restricted to MentorMind administrators.<br>If you believe this is an error, please contact your administrator.</div>
    <a class="back-btn" href="/">← Go Back</a>
    <div class="brand">Mentor<span>Mind</span></div>
  </div>
</body>
</html>
